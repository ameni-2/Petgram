<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Connexion à PetGram - Connectez-vous pour gérer le profil de votre animal">
  <title>
    PetGram 🐾 - Connexion
  </title>
</head>
<body>
      <h1>
        🐾 PetGram
      </h1>
      <h2>
        Connectez-vous à votre compte
      </h2>
  <form>
          <div>
            <label for="email">📧 Adresse email</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com">
          </div>
          <div>
            <label for="motdepasse">🔒 Mot de passe</label>
            <input type="password" id="motdepasse" name="motdepasse" placeholder="Votre mot de passe">
          </div>

          <div>
            <input type="checkbox" id="souvenir" name="souvenir">
            <label for="souvenir">Se souvenir de moi</label>
          </div>

          <input type="submit" value="Se connecter">
          <input type="reset"  value="Effacer">

    </form>

      <div>
        <p>
          Pas encore de compte ? 
          <a href="signup.html"> Inscrivez-vous ici </a>
        </p>
        <p>
          <a href="index.html"> Retour à l'accueil </a>
        </p>
      </div>
</body>
</html>
