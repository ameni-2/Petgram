<section>
    <div id="filtres">
        <select id="espece" name="espece">
                              <option value="">-- Choisissez l'espèce --</option>
                              <option value="chien"> 🐶 Chien</option>
                              <option value="chat"> 🐱 Chat</option>
                              <option value="lapin"> 🐰 Lapin</option>
                              <option value="oiseau"> 🐦 Oiseau</option>
                              <option value="poisson"> 🐟 Poisson</option>
                              <option value="reptile"> 🦎Reptile</option>
                              <option value="autre"> 🐾 Autre</option>
                            </select>
        <select id="age" name="age">
                              <option value="">-- Choisissez l'âge --</option>
                              <option value="puppy"> 🐕 Puppy (0-1 an)</option>
                              <option value="young"> 🐕 Young (1-3 ans)</option>
                              <option value="adult"> 🐕 Adult (3-7 ans)</option>
                              <option value="senior"> 🐕 Senior (7+ ans)</option>
                            </select>
        <select id="localisation" name="localisation">
                              <option value="">-- Choisissez la localisation --</option>
                              <option value="Tunis"> 📍 Tunis</option>
                              <option value="Bizerte"> 📍 Bizerte</option>
                              <option value="Nabeul"> 📍 Nabeul</option>
                              <option value="Sousse"> 📍 Sousse</option>
                                <option value="Sfax"> 📍 Sfax</option>
                                <option value="Gabes"> 📍 Gabes</option>
                                <option value="Autre"> 📍 Autre</option>
        </select>
    </div>
  <div id="swipe-card">
        <img id="swipe_photo" src="chat2.jpg" alt="Photo de l'animal" width="500px" height="500px">
        <div id="swipe-info"> 
            <h2 id="swipe_nom"> Max </h2>
        <div class="swipe-tags">
            <span> 3 ans </span>
            <span> 🐶 Labrador </span>
            <span> ♂️ Mâle </span>
            <span> 📍 Tunis </span>
        </div>
            <p> Joueur et affectueux, Max adore les promenades ! </p>
       </div>


    <div>
